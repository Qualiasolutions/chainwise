apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chainwise-ingress
  namespace: chainwise
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://chainwise.ai"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
  - hosts:
    - chainwise.ai
    - www.chainwise.ai
    secretName: chainwise-tls
  rules:
  - host: chainwise.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chainwise-service
            port:
              number: 80
  - host: www.chainwise.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chainwise-service
            port:
              number: 80