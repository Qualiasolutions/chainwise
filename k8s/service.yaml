apiVersion: v1
kind: Service
metadata:
  name: chainwise-service
  namespace: chainwise
  labels:
    app: chainwise
spec:
  selector:
    app: chainwise
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: chainwise-headless
  namespace: chainwise
  labels:
    app: chainwise
spec:
  clusterIP: None
  selector:
    app: chainwise
  ports:
  - name: http
    port: 3000
    targetPort: 3000