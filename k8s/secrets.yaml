apiVersion: v1
kind: Secret
metadata:
  name: chainwise-secrets
  namespace: chainwise
type: Opaque
data:
  # Base64 encoded secrets - replace with actual values
  supabase-service-role-key: ""
  stripe-secret-key: ""
  stripe-webhook-secret: ""
  openai-api-key: ""
  coingecko-api-key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chainwise-config
  namespace: chainwise
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_SUPABASE_URL: ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
  NEXT_PUBLIC_SITE_URL: "https://chainwise.ai"